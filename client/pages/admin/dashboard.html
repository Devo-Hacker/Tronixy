<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – Tronixy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'DM Sans', sans-serif; } h1,h2 { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl border border-gray-100 p-5 text-center animate-pulse h-24"></div>
      <div class="bg-white rounded-xl border border-gray-100 p-5 text-center animate-pulse h-24"></div>
      <div class="bg-white rounded-xl border border-gray-100 p-5 text-center animate-pulse h-24"></div>
      <div class="bg-white rounded-xl border border-gray-100 p-5 text-center animate-pulse h-24"></div>
    </div>

    <!-- Quick Links -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <a href="products.html" class="bg-white rounded-xl border border-gray-100 p-6 hover:shadow-md transition group">
        <div class="text-3xl mb-3">📦</div>
        <h2 class="font-bold text-gray-900 group-hover:text-blue-600 transition">Manage Products</h2>
        <p class="text-sm text-gray-500 mt-1">Add, edit, delete products and images</p>
      </a>
      <a href="orders.html" class="bg-white rounded-xl border border-gray-100 p-6 hover:shadow-md transition group">
        <div class="text-3xl mb-3">🚚</div>
        <h2 class="font-bold text-gray-900 group-hover:text-blue-600 transition">Manage Orders</h2>
        <p class="text-sm text-gray-500 mt-1">View and update all order statuses</p>
      </a>
      <a href="categories.html" class="bg-white rounded-xl border border-gray-100 p-6 hover:shadow-md transition group">
        <div class="text-3xl mb-3">🗂️</div>
        <h2 class="font-bold text-gray-900 group-hover:text-blue-600 transition">Manage Categories</h2>
        <p class="text-sm text-gray-500 mt-1">Create, update, delete categories</p>
      </a>
    </div>
  </main>

  <script src="../../js/api.js"></script>
  <script src="../../js/nav.js"></script>
  <script>
    async function init() {
      await Auth.load();
      if (!Auth.isLoggedIn() || !Auth.isAdmin()) { go('../home.html'); return; }
      renderNav();
      loadStats();
    }

    async function loadStats() {
      try {
        const [products, orders, categories] = await Promise.all([
          api.get('/product'),
          api.get('/order/admin/get-all-orders'),
          api.get('/cat/get-all'),
        ]);

        const revenue = orders.orders?.reduce((s, o) => s + (o.totalAmount || 0), 0) || 0;

        document.getElementById('stats').innerHTML = `
          ${stat('Total Products', products.products?.length || 0, '📦')}
          ${stat('Total Orders', orders.totalOrders || 0, '🚚')}
          ${stat('Categories', categories.totalCat || 0, '🗂️')}
          ${stat('Revenue', '₹' + revenue.toLocaleString(), '💰')}
        `;
      } catch (e) {
        document.getElementById('stats').innerHTML = `<p class="col-span-4 text-red-400 text-sm">${e.message}</p>`;
      }
    }

    function stat(label, value, icon) {
      return `
        <div class="bg-white rounded-xl border border-gray-100 p-5 text-center">
          <div class="text-2xl mb-1">${icon}</div>
          <p class="text-xl font-bold text-gray-900">${value}</p>
          <p class="text-xs text-gray-500">${label}</p>
        </div>`;
    }

    init();
  </script>
</body>
</html>
