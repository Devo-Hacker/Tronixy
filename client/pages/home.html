<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tronixy – Shop</title>
  <link href="../src/output.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1,h2,h3,nav { font-family: 'Syne', sans-serif; }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.12); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <!-- Hero Search -->
    <div class="bg-gradient-to-r from-gray-900 to-gray-700 rounded-2xl p-8 mb-8 text-white">
      <h1 class="text-3xl font-bold mb-1">Find What You Need</h1>
      <p class="text-gray-300 mb-5 text-sm">Electronics & tech, delivered fast.</p>
      <form onsubmit="handleSearch(event)" class="flex gap-2">
        <input id="searchInput" type="text" placeholder="Search products..."
          class="flex-1 px-4 py-2.5 rounded-lg text-gray-900 text-sm outline-none border-2 border-transparent focus:border-blue-400"/>
        <button type="submit" class="bg-blue-500 hover:bg-blue-600 px-6 py-2.5 rounded-lg font-semibold text-sm transition">Search</button>
        <button type="button" onclick="loadProducts()" class="bg-white/10 hover:bg-white/20 px-4 py-2.5 rounded-lg text-sm transition">All</button>
      </form>
    </div>

    <!-- Categories Filter -->
    <div id="categoryBar" class="flex gap-2 overflow-x-auto pb-2 mb-6 scrollbar-hide"></div>

    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-12 text-gray-400">Loading products...</div>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    let allProducts = [];

    async function init() {
      await Auth.load();
      renderNav('home');
      loadCategories();
      loadProducts();
    }

    async function loadProducts(keyword = '') {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">Loading...</div>';
      try {
        const url = keyword ? `/product/search?keyword=${encodeURIComponent(keyword)}` : '/product';
        const data = await api.get(url);
        allProducts = data.products;
        renderProducts(allProducts);
      } catch (e) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-400">${e.message}</div>`;
      }
    }

    async function loadCategories() {
      try {
        const data = await api.get('/cat/get-all');
        const bar = document.getElementById('categoryBar');
        bar.innerHTML = data.categories.map(c => `
          <button onclick="filterByCategory('${c._id}')"
            class="whitespace-nowrap px-4 py-1.5 rounded-full bg-white border border-gray-200 text-sm hover:bg-gray-900 hover:text-white transition font-medium">
            ${c.category}
          </button>
        `).join('');
      } catch {}
    }

    function filterByCategory(catId) {
      const filtered = allProducts.filter(p => p.category?._id === catId);
      renderProducts(filtered.length ? filtered : allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      if (!products.length) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">No products found.</div>';
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="card-hover bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm">
          <div class="relative">
            <img src="${p.images?.[0]?.url || 'https://placehold.co/400x300/f3f4f6/9ca3af?text=No+Image'}"
              alt="${p.name}" class="w-full h-44 object-cover"/>
            ${p.stock < 1 ? '<span class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">Out of Stock</span>' : ''}
          </div>
          <div class="p-3">
            <p class="text-xs text-blue-500 font-medium mb-0.5">${p.category?.category || 'Uncategorized'}</p>
            <h3 class="font-semibold text-gray-800 text-sm truncate">${p.name}</h3>
            <div class="flex items-center justify-between mt-2">
              <span class="text-blue-700 font-bold">₹${p.price.toLocaleString()}</span>
              <span class="text-xs text-gray-400">${p.rating?.toFixed(1) || '0'} ★ (${p.numReviews})</span>
            </div>
            <a href="product.html?id=${p._id}"
              class="block mt-3 text-center bg-gray-900 hover:bg-blue-600 text-white py-1.5 rounded-lg text-xs font-medium transition">
              View Details
            </a>
          </div>
        </div>
      `).join('');
    }

    function handleSearch(e) {
      e.preventDefault();
      const keyword = document.getElementById('searchInput').value.trim();
      if (keyword) loadProducts(keyword);
    }

    init();
  </script>
</body>
</html>
