<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tronixy – Shop</title>
  <link href="../src/output.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --cyan: #00f5ff; --glass: rgba(0,245,255,0.04); --glass-border: rgba(0,245,255,0.18); }
    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1,h2,h3 { font-family: 'Rajdhani', sans-serif; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; top: -200px; right: -100px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,180,255,0.1) 0%, rgba(0,100,255,0.05) 40%, transparent 70%);
      pointer-events: none; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite;
    }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }

    main { position: relative; z-index: 1; }

    .glass { background: rgba(15,30,60,0.92); border: 1px solid rgba(0,245,255,0.18); backdrop-filter: blur(12px); }

    .product-card {
      background: white;
      border: 1px solid #e5eaf2;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .product-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,245,255,0.03) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .product-card:hover {
      transform: translateY(-5px);
      border-color: #bcd0f0;
      box-shadow: 0 20px 40px rgba(0,50,120,0.1), 0 4px 12px rgba(0,0,0,0.06);
    }
    .product-card:hover::before { opacity: 1; }

    .btn-cyan {
      background: transparent; border: 1px solid var(--cyan);
      color: var(--cyan); font-family: 'Rajdhani', sans-serif;
      font-weight: 600; letter-spacing: 0.05em; transition: all 0.2s; cursor: pointer;
    }
    .btn-cyan:hover { background: var(--cyan); color: #050a12; box-shadow: 0 0 20px rgba(0,245,255,0.4); }

    .search-input {
      background: rgba(0,245,255,0.05);
      border: 1px solid rgba(0,245,255,0.2);
      color: white; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,245,255,0.1); }
    .search-input::placeholder { color: rgba(255,255,255,0.35); }

    .cat-pill {
      background: white; border: 1px solid #dde3ee;
      color: #4b5563; font-family: 'Rajdhani', sans-serif;
      font-weight: 500; letter-spacing: 0.05em;
      transition: all 0.2s; white-space: nowrap; cursor: pointer;
    }
    .cat-pill:hover { border-color: #0066cc; color: #0066cc; background: #f0f6ff; }

    .price-tag { color: #0a4fa0; font-family: 'Rajdhani', sans-serif; font-weight: 700; }

    .hero-scanline { position: relative; overflow: hidden; }
    .hero-scanline::after {
      content: ''; position: absolute; top: -2px; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.5), transparent);
      animation: scanline 4s linear infinite;
    }
    @keyframes scanline { 0%{top:-2px} 100%{top:100%} }

    .view-btn {
      background: #0f1e3c; border: 1px solid #1a3a6e;
      color: white; font-family: 'Rajdhani', sans-serif;
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 0.7rem; transition: all 0.2s;
      display: block; text-align: center; text-decoration: none;
    }
    .view-btn:hover { background: #0066cc; border-color: #0066cc; box-shadow: 0 4px 15px rgba(0,100,200,0.25); }

    .loading-text {
      color: #9ca3af; font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.15em; text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.4s ease forwards; opacity: 0; }

    .section-label {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 1.1rem; color: #1a2a4a; letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <!-- Hero Search — stays dark for contrast -->
    <div class="hero-scanline glass rounded-2xl p-8 mb-8 relative">
      <span class="absolute top-3 left-3 w-4 h-4 border-t border-l border-cyan-400 opacity-50"></span>
      <span class="absolute top-3 right-3 w-4 h-4 border-t border-r border-cyan-400 opacity-50"></span>
      <span class="absolute bottom-3 left-3 w-4 h-4 border-b border-l border-cyan-400 opacity-50"></span>
      <span class="absolute bottom-3 right-3 w-4 h-4 border-b border-r border-cyan-400 opacity-50"></span>
      <div class="relative z-10">
        <h1 class="text-4xl font-bold text-white mb-1 tracking-wide">Find What You <span class="text-cyan-400">Need</span></h1>
        <p class="text-gray-400 mb-6 text-sm tracking-wide">Electronics & tech, delivered fast.</p>
        <form onsubmit="handleSearch(event)" class="flex gap-2">
          <input id="searchInput" type="text" placeholder="Search products..." class="search-input flex-1 px-4 py-2.5 rounded-lg text-sm"/>
          <button type="submit" class="btn-cyan px-6 py-2.5 rounded-lg text-sm">Search</button>
          <button type="button" onclick="loadProducts()" class="px-4 py-2.5 rounded-lg text-sm text-gray-400 border border-white/10 hover:border-white/20 hover:text-white transition">All</button>
        </form>
      </div>
    </div>

    <!-- Categories Filter -->
    <div class="flex items-center gap-3 mb-6">
      <span class="section-label text-sm">Filter</span>
      <div id="categoryBar" class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide flex-1"></div>
    </div>

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-4">
      <h2 class="section-label">All Products</h2>
      <span id="productCount" class="text-xs text-gray-400" style="font-family:'Rajdhani',sans-serif;"></span>
    </div>

    <!-- Products Grid -->
    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-16"><p class="loading-text">Initializing...</p></div>
    </div>

  </main>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    let allProducts = [];

    async function init() {
      await Auth.load();
      renderNav('home');
      loadCategories();
      loadProducts();
    }

    async function loadProducts(keyword = '') {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '<div class="col-span-full text-center py-16"><p class="loading-text">Loading...</p></div>';
      try {
        const url = keyword ? `/product/search?keyword=${encodeURIComponent(keyword)}` : '/product';
        const data = await api.get(url);
        allProducts = data.products;
        renderProducts(allProducts);
      } catch (e) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-red-400 font-mono text-sm">${e.message}</div>`;
      }
    }

    async function loadCategories() {
      try {
        const data = await api.get('/cat/get-all');
        const bar = document.getElementById('categoryBar');
        bar.innerHTML = data.categories.map(c => `
          <button onclick="filterByCategory('${c._id}')" class="cat-pill px-4 py-1.5 rounded-full text-sm">
            ${c.category}
          </button>
        `).join('');
      } catch {}
    }

    function filterByCategory(catId) {
      const filtered = allProducts.filter(p => p.category?._id === catId);
      renderProducts(filtered.length ? filtered : allProducts);
    }

    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      const countEl = document.getElementById('productCount');
      if (countEl) countEl.textContent = products.length + ' items';

      if (!products.length) {
        grid.innerHTML = '<div class="col-span-full text-center py-12 loading-text">No products found</div>';
        return;
      }
      grid.innerHTML = products.map((p, i) => `
        <div class="product-card rounded-xl overflow-hidden fade-up" style="animation-delay:${i * 0.06}s">
          <div class="relative">
            <img src="${p.images?.[0]?.url || 'https://placehold.co/400x300/f3f6fb/9ca3af?text=No+Image'}"
              alt="${p.name}" class="w-full h-44 object-cover"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent"></div>
            ${p.stock < 1 ? '<span class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full font-mono tracking-wide">Out of Stock</span>' : ''}
            <span class="absolute top-2 right-2 text-xs font-mono bg-black/40 text-yellow-300 px-1.5 py-0.5 rounded backdrop-blur">${p.rating?.toFixed(1) || '0.0'}★</span>
          </div>
          <div class="p-3 relative z-10">
            <p class="text-xs font-mono mb-0.5 tracking-widest uppercase" style="color:#0080aa;">${p.category?.category || 'Uncategorized'}</p>
            <h3 class="font-semibold text-sm truncate tracking-wide" style="color:#1a2a4a;">${p.name}</h3>
            <div class="flex items-center justify-between mt-2 mb-3">
              <span class="price-tag text-lg">₹${p.price.toLocaleString()}</span>
              <span class="text-xs text-gray-400 font-mono">${p.numReviews} reviews</span>
            </div>
            <a href="product.html?id=${p._id}" class="view-btn py-1.5 rounded-lg">View Details</a>
          </div>
        </div>
      `).join('');
    }

    function handleSearch(e) {
      e.preventDefault();
      const keyword = document.getElementById('searchInput').value.trim();
      if (keyword) loadProducts(keyword);
    }

    init();
  </script>
</body>
</html>
