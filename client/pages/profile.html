<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Tronixy</title>
  <link href="../src/output.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'DM Sans', sans-serif; } h1,h2 { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">My Profile</h1>
    <div id="profileContent"><p class="text-gray-400">Loading...</p></div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    async function init() {
      await Auth.load();
      if (!Auth.isLoggedIn()) { go('login.html'); return; }
      renderNav('profile');
      renderProfile();
    }

    function renderProfile() {
      const u = Auth.user;
      document.getElementById('profileContent').innerHTML = `
        <!-- Profile Pic -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-4 flex items-center gap-5">
          <img id="profilePicImg"
            src="${u.profilePic?.url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.name) + '&background=1e293b&color=fff&size=80'}"
            class="w-20 h-20 rounded-full object-cover border-2 border-gray-200"/>
          <div>
            <p class="font-bold text-gray-900 text-lg">${u.name}</p>
            <p class="text-gray-500 text-sm">${u.email}</p>
            <span class="text-xs px-2 py-0.5 rounded-full mt-1 inline-block ${u.role === 'admin' ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700'}">${u.role}</span>
          </div>
        </div>

        <!-- Update Profile -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-4">
          <h2 class="font-bold text-gray-900 mb-4">Update Info</h2>
          <div id="profileMsg" class="hidden text-sm px-3 py-2 rounded-lg mb-3"></div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-500 mb-1 block">Name</label>
              <input id="updName" type="text" value="${u.name}" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">Email</label>
              <input id="updEmail" type="email" value="${u.email}" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
            <div class="sm:col-span-2">
              <label class="text-xs text-gray-500 mb-1 block">Address</label>
              <input id="updAddress" type="text" value="${u.address || ''}" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">City</label>
              <input id="updCity" type="text" value="${u.city || ''}" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">Country</label>
              <input id="updCountry" type="text" value="${u.country || ''}" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">Phone</label>
              <input id="updPhone" type="text" value="${u.phone || ''}" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
          </div>
          <button onclick="updateProfile()" class="mt-4 bg-gray-900 hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold transition">Save Changes</button>
        </div>

        <!-- Change Password -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-4">
          <h2 class="font-bold text-gray-900 mb-4">Change Password</h2>
          <div id="passMsg" class="hidden text-sm px-3 py-2 rounded-lg mb-3"></div>
          <div class="flex flex-col gap-3">
            <div>
              <label class="text-xs text-gray-500 mb-1 block">Old Password</label>
              <input id="oldPass" type="password" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
            <div>
              <label class="text-xs text-gray-500 mb-1 block">New Password</label>
              <input id="newPass" type="password" class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
            </div>
          </div>
          <button onclick="updatePassword()" class="mt-4 bg-gray-900 hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold transition">Update Password</button>
        </div>

        <!-- Update Profile Picture -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6">
          <h2 class="font-bold text-gray-900 mb-4">Profile Picture</h2>
          <div id="picMsg" class="hidden text-sm px-3 py-2 rounded-lg mb-3"></div>
          <input id="picFile" type="file" accept="image/*" onchange="previewPic(event)"
            class="w-full border border-gray-200 px-3 py-2 rounded-lg text-sm mb-3"/>
          <img id="picPreview" class="hidden w-24 h-24 rounded-full object-cover border border-gray-200 mb-3"/>
          <button onclick="uploadPic()" class="bg-gray-900 hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold transition">Upload Picture</button>
        </div>
      `;
    }

    function showMsg(elId, msg, isError = false) {
      const el = document.getElementById(elId);
      el.textContent = msg;
      el.className = `text-sm px-3 py-2 rounded-lg mb-3 ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-700'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    async function updateProfile() {
      try {
        await api.put('/user/profile-update', {
          name: document.getElementById('updName').value,
          email: document.getElementById('updEmail').value,
          address: document.getElementById('updAddress').value,
          city: document.getElementById('updCity').value,
          country: document.getElementById('updCountry').value,
          phone: document.getElementById('updPhone').value,
        });
        showMsg('profileMsg', 'Profile updated successfully!');
        await Auth.load();
      } catch (e) {
        showMsg('profileMsg', e.message, true);
      }
    }

    async function updatePassword() {
      try {
        await api.put('/user/update-password', {
          oldPassword: document.getElementById('oldPass').value,
          newPassword: document.getElementById('newPass').value,
        });
        showMsg('passMsg', 'Password updated successfully!');
        document.getElementById('oldPass').value = '';
        document.getElementById('newPass').value = '';
      } catch (e) {
        showMsg('passMsg', e.message, true);
      }
    }

    function previewPic(e) {
      const file = e.target.files[0];
      if (!file) return;
      const preview = document.getElementById('picPreview');
      preview.src = URL.createObjectURL(file);
      preview.classList.remove('hidden');
    }

    async function uploadPic() {
  const file = document.getElementById('picFile').files[0];
  if (!file) { showMsg('picMsg', 'Please select a file first.', true); return; }
  const fd = new FormData();
  fd.append('file', file);
  try {
    await api.upload('/user/update-picture', fd);
    showMsg('picMsg', 'Profile picture updated!');
    await Auth.load();
    renderProfile();
  } catch (e) {
    showMsg('picMsg', e.message, true);
  }
}
    init();
  </script>
</body>
</html>
