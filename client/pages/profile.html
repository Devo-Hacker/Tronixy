<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Tronixy</title>
  <link href="../src/output.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'DM Sans', sans-serif; } h1,h2 { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">My Profile</h1>
    <div id="profileContent"><p class="text-gray-400">Loading...</p></div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    async function init() {
      await Auth.load();
      if (!Auth.isLoggedIn()) { go('login.html'); return; }
      renderNav('profile');
      renderProfile();
    }

    function renderProfile() {
      const u = Auth.user;
      document.getElementById('profileContent').innerHTML = `
        <!-- Avatar Card -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6 mb-4 flex items-center gap-5">
          <img
            src="${u.profilePic?.url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.name) + '&background=1e293b&color=fff&size=80'}"
            class="w-20 h-20 rounded-full object-cover border-2 border-gray-200"/>
          <div>
            <p class="font-bold text-gray-900 text-lg">${u.name}</p>
            <p class="text-gray-500 text-sm">${u.email}</p>
            <span class="text-xs px-2 py-0.5 rounded-full mt-1 inline-block ${u.role === 'admin' ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700'}">${u.role}</span>
          </div>
        </div>

        <!-- User Info -->
        <div class="bg-white rounded-2xl border border-gray-100 p-6">
          <h2 class="font-bold text-gray-900 mb-5">User Information</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">Full Name</p>
              <p class="text-sm font-semibold text-gray-800">${u.name || '—'}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">Email</p>
              <p class="text-sm font-semibold text-gray-800">${u.email || '—'}</p>
            </div>
            <div class="sm:col-span-2">
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">Address</p>
              <p class="text-sm font-semibold text-gray-800">${u.address || '—'}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">City</p>
              <p class="text-sm font-semibold text-gray-800">${u.city || '—'}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">Country</p>
              <p class="text-sm font-semibold text-gray-800">${u.country || '—'}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">Phone</p>
              <p class="text-sm font-semibold text-gray-800">${u.phone || '—'}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1 uppercase tracking-wide">Member Since</p>
              <p class="text-sm font-semibold text-gray-800">${new Date(u.createdAt).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'})}</p>
            </div>
          </div>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
