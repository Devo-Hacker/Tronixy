<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders – Tronixy</title>
  <link href="../src/output.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'DM Sans', sans-serif; } h1,h2 { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">My Orders</h1>
    <div id="ordersContent"><p class="text-gray-400">Loading orders...</p></div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    async function init() {
      await Auth.load();
      if (!Auth.isLoggedIn()) { go('login.html'); return; }
      renderNav('orders');
      loadOrders();
    }

    async function loadOrders() {
      try {
        const data = await api.get('/order/my-orders');
        const el = document.getElementById('ordersContent');

        if (!data.orders?.length) {
          el.innerHTML = `
            <div class="text-center py-16">
              <p class="text-4xl mb-4">📦</p>
              <p class="text-gray-500 mb-4">No orders yet.</p>
              <a href="home.html" class="inline-block bg-gray-900 text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-600 transition">Start Shopping</a>
            </div>`;
          return;
        }

        const statusColor = { processing: 'bg-yellow-100 text-yellow-700', shipped: 'bg-blue-100 text-blue-700', deliverd: 'bg-green-100 text-green-700' };

        el.innerHTML = data.orders.map(o => `
          <div class="bg-white rounded-xl border border-gray-100 p-5 mb-3">
            <div class="flex items-center justify-between mb-3">
              <div>
                <p class="text-xs text-gray-400">Order ID</p>
                <p class="font-mono text-xs text-gray-700">${o._id}</p>
              </div>
              <span class="text-xs px-2.5 py-1 rounded-full font-medium ${statusColor[o.orderStatus] || 'bg-gray-100 text-gray-600'}">${o.orderStatus}</span>
            </div>

            <div class="flex flex-wrap gap-2 mb-3">
              ${o.orderItems?.map(i => `
                <div class="flex items-center gap-2 bg-gray-50 rounded-lg px-2 py-1">
                  <img src="${i.image || 'https://placehold.co/32x32/f3f4f6/9ca3af?text=?'}" class="w-6 h-6 rounded object-cover"/>
                  <span class="text-xs text-gray-700">${i.name} × ${i.quantity}</span>
                </div>
              `).join('')}
            </div>

            <div class="flex items-center justify-between">
              <div class="text-sm">
                <span class="text-gray-500">${o.paymentMethod}</span>
                <span class="mx-2 text-gray-300">|</span>
                <span class="font-semibold text-gray-900">₹${o.totalAmount?.toLocaleString()}</span>
              </div>
              <a href="order-detail.html?id=${o._id}" class="text-xs text-blue-600 hover:underline font-medium">View Details →</a>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('ordersContent').innerHTML = `<p class="text-red-400">${e.message}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
