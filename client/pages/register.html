<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Tronixy</title>
  <link href="../src/output.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'DM Sans', sans-serif; } h1,h2 { font-family: 'Syne', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="navbar"></div>

  <main class="max-w-lg mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Create Account</h1>
      <p class="text-gray-500 text-sm mb-6">Join Tronixy today</p>

      <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-2.5 rounded-lg mb-4"></div>
      <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-2.5 rounded-lg mb-4"></div>

      <form id="registerForm" onsubmit="handleRegister(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
          <label class="text-xs font-medium text-gray-600 mb-1 block">Full Name</label>
          <input id="name" type="text" placeholder="John Doe" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>
        <div class="sm:col-span-2">
          <label class="text-xs font-medium text-gray-600 mb-1 block">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>
        <div class="sm:col-span-2">
          <label class="text-xs font-medium text-gray-600 mb-1 block">Password</label>
          <input id="password" type="password" placeholder="Min. 6 characters" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>
        <div class="sm:col-span-2">
          <label class="text-xs font-medium text-gray-600 mb-1 block">Address</label>
          <input id="address" type="text" placeholder="Street address" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">City</label>
          <input id="city" type="text" placeholder="City" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>
        <div>
          <label class="text-xs font-medium text-gray-600 mb-1 block">Country</label>
          <input id="country" type="text" placeholder="Country" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>
        <div class="sm:col-span-2">
          <label class="text-xs font-medium text-gray-600 mb-1 block">Phone</label>
          <input id="phone" type="text" placeholder="+91 XXXXX XXXXX" required
            class="w-full border border-gray-200 px-3 py-2.5 rounded-lg text-sm outline-none focus:border-blue-400 transition"/>
        </div>

        <div class="sm:col-span-2 mt-1">
          <button type="submit" id="regBtn"
            class="w-full bg-gray-900 hover:bg-blue-600 text-white py-2.5 rounded-lg font-semibold text-sm transition">
            Create Account
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-gray-500 mt-5">
        Already have an account? <a href="login.html" class="text-blue-600 font-medium hover:underline">Login</a>
      </p>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    async function init() {
      await Auth.load();
      if (Auth.isLoggedIn()) go('home.html');
      renderNav('register');
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      const errEl = document.getElementById('errorMsg');
      const sucEl = document.getElementById('successMsg');
      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        await api.post('/user/register', {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          country: document.getElementById('country').value,
          phone: document.getElementById('phone').value,
        });
        sucEl.textContent = 'Account created! Redirecting to login...';
        sucEl.classList.remove('hidden');
        setTimeout(() => go('login.html'), 1500);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    init();
  </script>
</body>
</html>
